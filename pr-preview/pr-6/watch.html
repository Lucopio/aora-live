<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>GymTracker Watch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@500;600;700&display=swap');

:root {
  --primary: #4DA3FF;
  --primary-dim: #1a3a5c;
  --success: #5CDB6A;
  --success-dim: #1a3d1e;
  --danger: #FF5252;
  --danger-dim: #3d1a1a;
  --bg: #000000;
  --surface: #141414;
  --surface2: #1E1E1E;
  --text: #FFFFFF;
  --text-dim: #777777;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
}

/* All screens */
.s {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 38px 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.s.on { display: flex; }

/* Circular safe zone helper - content stays within circular viewport */
.s::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, transparent 46%, rgba(0,0,0,0.85) 54%);
  pointer-events: none;
  z-index: 50;
}

/* ===== HOME ===== */
#home { gap: 8px; }

.logo {
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 2px;
}
.tagline {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.btn-start {
  width: 140px;
  height: 52px;
  border-radius: 26px;
  background: var(--success);
  border: none;
  color: #000;
  font-size: 15px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  box-shadow: 0 0 24px rgba(92,219,106,0.25);
  transition: transform 0.12s;
}
.btn-start:active { transform: scale(0.92); }
.btn-start svg { width: 18px; height: 18px; fill: #000; }

.last-info {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 6px;
  text-align: center;
}

/* ===== CONFIG ===== */
#config { gap: 6px; }

.cfg-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.cfg-value {
  font-family: var(--mono);
  font-size: 52px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.cfg-unit {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.stepper {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}
.step-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--surface2);
  border: 2px solid #2a2a2a;
  color: var(--primary);
  font-size: 26px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s;
}
.step-btn:active { transform: scale(0.88); background: #2a2a2a; }

.btn-go {
  width: 130px;
  height: 46px;
  border-radius: 23px;
  background: var(--success);
  border: none;
  color: #000;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: transform 0.12s;
}
.btn-go:active { transform: scale(0.92); }

/* ===== WORKOUT ===== */
#workout { gap: 3px; padding: 32px 20px; }

.w-dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

.chrono {
  font-family: var(--mono);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 1.5px;
  line-height: 1;
}
.chrono-sub {
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.ex-count {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 4px;
}

.motiv {
  font-size: 9px;
  color: var(--text-dim);
  text-align: center;
  max-width: 160px;
  line-height: 1.35;
  margin-bottom: 6px;
  font-style: italic;
}

.action-row {
  display: flex;
  gap: 8px;
  margin-bottom: 4px;
}
.btn-rest {
  height: 42px;
  padding: 0 14px;
  border-radius: 21px;
  background: var(--primary-dim);
  border: 1.5px solid var(--primary);
  color: var(--primary);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: transform 0.12s;
}
.btn-rest:active { transform: scale(0.92); }
.btn-rest svg { width: 13px; height: 13px; stroke: var(--primary); fill: none; stroke-width: 2; }

.btn-plus {
  height: 42px;
  padding: 0 16px;
  border-radius: 21px;
  background: var(--success);
  border: none;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: transform 0.12s;
}
.btn-plus:active { transform: scale(0.92); }

.btn-stop {
  background: none;
  border: none;
  color: var(--danger);
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  padding: 4px 10px;
}

/* ===== REST ===== */
#rest { gap: 0; padding: 28px; }

.ring-wrap {
  width: 150px;
  height: 150px;
  position: relative;
  margin-bottom: 6px;
}
.ring-wrap svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.ring-bg { fill: none; stroke: #1a1a1a; stroke-width: 7; }
.ring-fg {
  fill: none;
  stroke: var(--primary);
  stroke-width: 7;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.35s linear, stroke 0.4s;
}
.ring-fg.alert { stroke: var(--danger); }

.ring-num {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.ring-val {
  font-family: var(--mono);
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  transition: color 0.3s;
}
.ring-val.alert { color: var(--danger); }
.ring-sec {
  font-size: 9px;
  color: var(--text-dim);
}

.rest-status {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
  transition: color 0.3s;
}
.rest-status.alert {
  color: var(--danger);
  animation: shake 0.35s infinite;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 30%{transform:translateX(-2px)} 70%{transform:translateX(2px)} }

.btn-skip {
  padding: 8px 22px;
  border-radius: 16px;
  background: var(--surface2);
  border: 1.5px solid #2a2a2a;
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: transform 0.12s;
}
.btn-skip:active { transform: scale(0.9); background: #2a2a2a; }

/* ===== DONE ===== */
#done { gap: 6px; }

.done-icon { font-size: 30px; }
.done-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--success);
}

.done-stats {
  display: flex;
  gap: 24px;
  margin: 6px 0;
}
.done-stat { text-align: center; }
.done-val {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
}
.done-lbl {
  font-size: 8px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.done-quote {
  font-size: 9px;
  color: var(--text-dim);
  text-align: center;
  font-style: italic;
  max-width: 160px;
  line-height: 1.3;
}

.btn-ok {
  width: 110px;
  height: 40px;
  border-radius: 20px;
  background: var(--primary);
  border: none;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  margin-top: 4px;
  transition: transform 0.12s;
}
.btn-ok:active { transform: scale(0.92); }

/* Beep visual */
.beep-flash {
  position: fixed;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--danger);
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 200;
  pointer-events: none;
}
.beep-flash.on { opacity: 1; }
</style>
</head>
<body>

<div class="beep-flash" id="beepFlash">BEEP</div>

<!-- HOME -->
<div class="s on" id="home">
  <div class="logo">GymTracker</div>
  <div class="tagline">Listo para entrenar?</div>
  <button class="btn-start" onclick="go('config')">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Iniciar
  </button>
  <div class="last-info" id="lastInfo"></div>
</div>

<!-- CONFIG -->
<div class="s" id="config">
  <div class="cfg-label">Descanso</div>
  <div class="cfg-value" id="cfgVal">60</div>
  <div class="cfg-unit">segundos</div>
  <div class="stepper">
    <button class="step-btn" onclick="cfgStep(-15)">-</button>
    <button class="step-btn" onclick="cfgStep(15)">+</button>
  </div>
  <button class="btn-go" onclick="begin()">Comenzar</button>
</div>

<!-- WORKOUT -->
<div class="s" id="workout">
  <div class="w-dot"></div>
  <div class="chrono" id="chrono">00:00:00</div>
  <div class="chrono-sub">Entrenamiento</div>
  <div class="ex-count" id="exCount">0 ejercicios</div>
  <div class="motiv" id="motiv">Cada repeticion cuenta</div>
  <div class="action-row">
    <button class="btn-rest" onclick="startRest()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Descanso
    </button>
    <button class="btn-plus" onclick="addEx()">Listo +1</button>
  </div>
  <button class="btn-stop" onclick="finish()">Finalizar</button>
</div>

<!-- REST -->
<div class="s" id="rest">
  <div class="ring-wrap">
    <svg viewBox="0 0 150 150">
      <circle class="ring-bg" cx="75" cy="75" r="64"/>
      <circle class="ring-fg" id="ringFg" cx="75" cy="75" r="64"
        stroke-dasharray="402.12" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-num">
      <div class="ring-val" id="ringVal">60</div>
      <div class="ring-sec">seg</div>
    </div>
  </div>
  <div class="rest-status" id="restStatus">Descansando...</div>
  <button class="btn-skip" onclick="skipRest()">Saltar</button>
</div>

<!-- DONE -->
<div class="s" id="done">
  <div class="done-icon">🏆</div>
  <div class="done-title">Completo!</div>
  <div class="done-stats">
    <div class="done-stat"><div class="done-val" id="doneTime">--</div><div class="done-lbl">Duracion</div></div>
    <div class="done-stat"><div class="done-val" id="doneEx">--</div><div class="done-lbl">Ejercicios</div></div>
  </div>
  <div class="done-quote" id="doneQuote">Gran trabajo hoy</div>
  <button class="btn-ok" onclick="go('home')">Aceptar</button>
</div>

<script>
// State
let restSec = 60;
let t0 = null;
let tInt = null;
let exN = 0;
let cdInt = null;
let cdRem = 0;
let actx = null;

const motivs = [
  "Cada repeticion cuenta",
  "Tu unico rival eres tu",
  "La disciplina gana siempre",
  "Un set mas, tu puedes",
  "Hoy eres mas fuerte que ayer",
  "No pares ahora",
  "La constancia construye todo",
  "Aprieta esa ultima serie",
  "Estas mas cerca de lo que crees",
  "El habito hace al campeon",
];
const endQ = [
  "Gran trabajo hoy. A recuperarse.",
  "Otro dia, otra victoria.",
  "La constancia es tu superpoder.",
  "Cada sesion te acerca a tu mejor version.",
];

// Nav
function go(id) {
  document.querySelectorAll('.s').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// Config
function cfgStep(d) {
  restSec = Math.max(15, Math.min(300, restSec + d));
  document.getElementById('cfgVal').textContent = restSec;
}

// Start workout
function begin() {
  exN = 0;
  t0 = Date.now();
  go('workout');
  document.getElementById('exCount').textContent = '0 ejercicios';
  newMotiv();

  clearInterval(tInt);
  tInt = setInterval(() => {
    const s = Math.floor((Date.now() - t0) / 1000);
    document.getElementById('chrono').textContent =
      `${p(Math.floor(s/3600))}:${p(Math.floor((s%3600)/60))}:${p(s%60)}`;
  }, 1000);

  // Keep screen on
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

function p(n) { return String(n).padStart(2, '0'); }

function newMotiv() {
  document.getElementById('motiv').textContent = motivs[Math.floor(Math.random() * motivs.length)];
}

// Exercise
function addEx() {
  exN++;
  document.getElementById('exCount').textContent = exN + ' ejercicio' + (exN > 1 ? 's' : '');
  newMotiv();
  startRest();
}

// Rest
function startRest() {
  cdRem = restSec;
  const total = restSec;
  const circ = 2 * Math.PI * 64; // 402.12
  const fg = document.getElementById('ringFg');
  const val = document.getElementById('ringVal');
  const st = document.getElementById('restStatus');

  fg.classList.remove('alert');
  val.classList.remove('alert');
  st.classList.remove('alert');
  st.textContent = 'Descansando...';

  go('rest');
  upd();

  clearInterval(cdInt);
  cdInt = setInterval(() => {
    cdRem--;

    if (cdRem <= 10 && cdRem > 0) {
      fg.classList.add('alert');
      val.classList.add('alert');
      st.classList.add('alert');
      st.textContent = 'Preparate!';
      beep(800, 120);
    }

    if (cdRem <= 0) {
      clearInterval(cdInt);
      beep(1200, 500);
      try { navigator.vibrate([300, 100, 300]); } catch(e) {}
      val.textContent = '0';
      st.textContent = 'Tiempo!';
      setTimeout(() => go('workout'), 1200);
      return;
    }
    upd();
  }, 1000);

  function upd() {
    fg.style.strokeDashoffset = circ * (1 - cdRem / total);
    val.textContent = cdRem;
  }
}

function skipRest() {
  clearInterval(cdInt);
  go('workout');
}

// Finish
function finish() {
  clearInterval(tInt);
  clearInterval(cdInt);
  const ms = Date.now() - t0;
  const s = Math.floor(ms / 1000);
  document.getElementById('doneTime').textContent = `${Math.floor(s/60)}:${p(s%60)}`;
  document.getElementById('doneEx').textContent = exN;
  document.getElementById('doneQuote').textContent = endQ[Math.floor(Math.random() * endQ.length)];

  // Save last session
  try {
    localStorage.setItem('gt_watch_last', JSON.stringify({
      date: new Date().toISOString(),
      duration: ms,
      exercises: exN
    }));
  } catch(e) {}

  go('done');
}

// Audio
function beep(freq, dur) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0.5, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur / 1000);
    o.start(); o.stop(actx.currentTime + dur / 1000);

    const fl = document.getElementById('beepFlash');
    fl.textContent = dur > 200 ? 'BEEEP!' : 'BEEP';
    fl.classList.add('on');
    setTimeout(() => fl.classList.remove('on'), 300);
  } catch(e) {}
}

// Load last session
try {
  const last = JSON.parse(localStorage.getItem('gt_watch_last'));
  if (last) {
    const d = new Date(last.date);
    const diff = Math.floor((Date.now() - d.getTime()) / 3600000);
    let when = diff < 1 ? 'Hace un momento' : diff < 24 ? `Hace ${diff}h` : `Hace ${Math.floor(diff/24)}d`;
    document.getElementById('lastInfo').textContent = `${when} - ${last.exercises} ej - ${Math.floor(last.duration/60000)}min`;
  }
} catch(e) {}
</script>
</body>
</html>
